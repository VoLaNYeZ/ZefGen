name: Guardrails

on:
  push:
  pull_request:

jobs:
  guardrails:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Credential guard
        run: npm run check:credentials

      - name: Legal links smoke checks
        run: npm run check:smoke:legal-links

      - name: Build
        run: npm run build
